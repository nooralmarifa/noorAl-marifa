<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نتائج الطلاب</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#eef2f7;
margin:0;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
min-height:100vh;
background:#f6f8fb;
display:flex;
flex-direction:column;
}

/* الهيدر */

header{
background:#2F8B73;
color:white;
padding:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.school{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{
width:60px;
height:60px;
object-fit:contain;
}

.school-name{
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
flex:1;
}

/* البحث */

.search-box{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
font-size:15px;
border-radius:8px;
border:1px solid #ccc;
}

.results{
margin-top:15px;
}

.student{
background:#f9fafc;
padding:12px;
margin-top:8px;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

.student:hover{
background:#eef6f4;
}

/* الأوائل */

.top-title{
text-align:center;
font-size:18px;
margin-bottom:15px;
font-weight:bold;
}

.top-students{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background:white;
border-radius:14px;
padding:15px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
text-align:center;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.rank{
font-size:22px;
margin-bottom:6px;
}

.name{
font-weight:bold;
margin-bottom:4px;
}

.grade{
font-size:13px;
color:#777;
}

/* ميداليات */

.gold{color:#d4af37;}
.silver{color:#9aa0a6;}
.bronze{color:#cd7f32;}

/* الفوتر */

.footer{
text-align:center;
font-size:12px;
color:#777;
padding:10px;
}

</style>

</head>

<body>

<div class="app">

<header>

<div class="school">

<img src="logo.jpeg" class="logo">

<div class="school-text">

<div class="school-name">
ثانوية نور المعرفة الأهلية
</div>

<div class="developer">
مطور الموقع: الأستاذ أحمد يحيى
</div>

</div>

</div>

</header>

<div class="container">

<!-- البحث -->

<div class="search-box">

<input type="text" id="searchInput" placeholder="🔎 ابحث عن اسم الطالب">

<div class="results" id="results"></div>

</div>

<!-- الأوائل -->

<div class="top-title">
🏆 أوائل المدرسة
</div>

<div class="top-students" id="topStudents"></div>

</div>

<div class="footer">
مطور الموقع: الأستاذ أحمد يحيى
</div>

</div>

<script>

let students=[];

fetch("https://script.google.com/macros/s/AKfycbxopBokrO5hVaRqywgOZLD_FXmpLLdzHujFxpcfqWPu2eylieqYs2E-pl9gNYOPY7ym2A/exec")

.then(res=>res.json())

.then(data=>{

students=data;

// ترتيب حسب المجموع
let sorted=[...students].sort((a,b)=>b.total-a.total);

let top10=sorted.slice(0,10);

let html="";

top10.forEach((s,i)=>{

let medal="#"+(i+1);
let medalClass="";

if(i==0){ medal="🥇"; medalClass="gold"; }
if(i==1){ medal="🥈"; medalClass="silver"; }
if(i==2){ medal="🥉"; medalClass="bronze"; }

html+=`
<div class="card">
<div class="rank ${medalClass}">${medal}</div>
<div class="name">${s.name}</div>
<div class="grade">${s.grade}</div>
</div>
`;

});

document.getElementById("topStudents").innerHTML=html;

});


// البحث

document.getElementById("searchInput").addEventListener("input",function(){

let value=this.value.toLowerCase();

let filtered=students.filter(s=>
s.name.toLowerCase().includes(value)
);

let html="";

filtered.forEach(s=>{

html+=`
<div class="student"
onclick="openStudent('${encodeURIComponent(s.name)}')">
${s.name}
</div>
`;

});

document.getElementById("results").innerHTML=html;

});


function openStudent(name){

window.location.href="student.html?name="+name;

}

</script>

</body>
</html>
