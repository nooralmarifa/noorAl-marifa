<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتائج الطلاب - ثانوية نور المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* تعريف متغيرات الألوان للوضعين */
        :root {
            --bg-body: linear-gradient(135deg,#0f172a,#1e293b);
            --bg-card: linear-gradient(135deg,#1f2937,#111827);
            --text-main: white;
            --input-bg: #0f172a;
            --input-border: #374151;
            --item-bg: #1f2937;
        }

        [data-theme="light"] {
            --bg-body: linear-gradient(135deg,#e2e8f0,#f8fafc);
            --bg-card: linear-gradient(135deg,#ffffff,#f1f5f9);
            --text-main: #1e293b;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --item-bg: #f8fafc;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Cairo', sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body{
            direction:rtl;
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
        }

        .app{
            width:100%;
            max-width:480px;
            margin: 0 auto;
            display:flex;
            flex-direction:column;
        }

        /* ===== الهيدر ===== */
        .hero{
            padding:30px 20px;
            text-align:center;
        }

        .logo{
            width:100px;
            height:100px;
            margin-bottom:15px;
            border-radius:50%;
            object-fit:cover;
            border:3px solid #4facfe;
            box-shadow:0 5px 15px rgba(0,0,0,0.4);
        }

        .school-name{
            font-size:24px;
            font-weight:900;
            margin-bottom:5px;
        }

        .developer-info{
            font-size:14px;
            opacity:.7;
        }

        .container{
            padding:20px;
        }

        /* ===== صندوق البحث ===== */
        .card {
            background: var(--bg-card);
            border-radius:20px;
            padding:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
            margin-bottom: 25px;
        }

        h3 {
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input{
            width:100%;
            padding:14px;
            font-size:15px;
            border-radius:12px;
            border:1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: .3s;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }

        /* نتائج البحث */
        .student-item {
            background: var(--item-bg);
            padding:15px;
            margin-top:10px;
            border-radius:12px;
            cursor:pointer;
            transition:.2s;
            border-right: 4px solid #4facfe;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .student-item:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }

        /* ===== الأوائل ===== */
        .top-students-grid {
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:15px;
        }

        .rank-card {
            background: var(--bg-card);
            padding:20px;
            border-radius:15px;
            text-align:center;
            transition:.3s;
            border: 1px solid rgba(120,120,120,0.1);
        }

        .rank-card:hover {
            transform:translateY(-5px);
        }

        .medal-icon {
            font-size:28px;
            margin-bottom:10px;
            display: block;
        }

        .student-name {
            font-weight:bold;
            font-size: 15px;
            display: block;
            margin-bottom: 5px;
        }

        .student-grade {
            font-size:12px;
            opacity:.6;
        }

        /* ألوان الميداليات */
        .gold { color:#ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.3); }
        .silver { color:#94a3b8; }
        .bronze { color:#d97706; }

        .footer{
            text-align:center;
            padding:30px 15px;
            font-size:13px;
            color:#64748b;
        }

        /* زر تبديل الوضع */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #4facfe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            font-size: 20px;
            border: none;
            color: white;
        }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="app">
    <div class="hero">
        <img src="logo.jpeg" class="logo">
        <div class="school-name">ثانوية نور المعرفة الأهلية</div>
        <div class="developer-info">مطور الموقع: الأستاذ أحمد يحيى</div>
    </div>

    <div class="container">
        <div class="card">
            <h3>🔎 ابحث عن اسم الطالب</h3>
            <input type="text" id="searchInput" placeholder="اكتب اسم الطالب هنا...">
            <div id="results"></div>
        </div>

        <h3>🏆 أوائل المدرسة</h3>
        <div class="top-students-grid" id="topStudents"></div>
    </div>

    <div class="footer">
        © ثانوية نور المعرفة الأهلية - جميع الحقوق محفوظة
    </div>
</div>

<script>
    // وظيفة تبديل الوضع
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'light') {
            body.removeAttribute('data-theme');
            btn.innerHTML = '🌙';
            localStorage.setItem('theme', 'dark');
        } else {
            body.setAttribute('data-theme', 'light');
            btn.innerHTML = '☀️';
            localStorage.setItem('theme', 'light');
        }
    }

    // تحميل الوضع المحفوظ
    if (localStorage.getItem('theme') === 'light') {
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('themeBtn').innerHTML = '☀️';
    }

    let students=[];

    // جلب البيانات
    fetch("https://script.google.com/macros/s/AKfycbxopBokrO5hVaRqywgOZLD_FXmpLLdzHujFxpcfqWPu2eylieqYs2E-pl9gNYOPY7ym2A/exec")
    .then(res=>res.json())
    .then(data=>{
        students=data;
        let sorted=[...students].sort((a,b)=>b.total-a.total);
        let top10=sorted.slice(0,10);
        let html="";
        top10.forEach((s,i)=>{
            let medal = "#" + (i+1);
            let medalClass = "";
            if(i===0){ medal="🥇"; medalClass="gold"; }
            else if(i===1){ medal="🥈"; medalClass="silver"; }
            else if(i===2){ medal="🥉"; medalClass="bronze"; }
            html+=`
                <div class="rank-card">
                    <span class="medal-icon ${medalClass}">${medal}</span>
                    <span class="student-name">${s.name}</span>
                    <span class="student-grade">${s.grade}</span>
                </div>`;
        });
        document.getElementById("topStudents").innerHTML=html;
    });

    // منطق البحث
    document.getElementById("searchInput").addEventListener("input",function(){
        let value=this.value.toLowerCase().trim();
        let resultsDiv = document.getElementById("results");
        if(value === "") { resultsDiv.innerHTML = ""; return; }
        let filtered=students.filter(s=> s.name.toLowerCase().includes(value));
        let html="";
        filtered.slice(0, 5).forEach(s=>{
            html+=`
                <div class="student-item" onclick="openStudent('${encodeURIComponent(s.name)}')">
                    <span>${s.name}</span>
                    <span style="opacity: 0.5; font-size: 12px;">عرض النتيجة ←</span>
                </div>`;
        });
        resultsDiv.innerHTML=html;
    });

    function openStudent(name){
        window.location.href="student.html?name="+name;
    }
</script>

</body>
</html>
