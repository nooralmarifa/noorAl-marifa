<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتائج الطلاب - ثانوية نور المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Cairo', sans-serif;
        }

        body{
            direction:rtl;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            min-height: 100vh;
        }

        .app{
            width:100%;
            max-width:480px;
            margin: 0 auto;
            display:flex;
            flex-direction:column;
        }

        /* ===== الهيدر (نفس نمط index) ===== */
        .hero{
            padding:30px 20px;
            text-align:center;
        }

        .logo{
            width:100px;
            height:100px;
            margin-bottom:15px;
            border-radius:50%;
            object-fit:cover;
            border:3px solid #4facfe;
            box-shadow:0 5px 15px rgba(0,0,0,0.4);
        }

        .school-name{
            font-size:24px;
            font-weight:900;
            margin-bottom:5px;
        }

        .developer-info{
            font-size:14px;
            opacity:.7;
        }

        .container{
            padding:20px;
        }

        /* ===== صندوق البحث ===== */
        .card {
            background:linear-gradient(135deg,#1f2937,#111827);
            border-radius:20px;
            padding:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        h3 {
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input{
            width:100%;
            padding:14px;
            font-size:15px;
            border-radius:12px;
            border:1px solid #374151;
            background: #0f172a;
            color: white;
            outline: none;
            transition: .3s;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }

        /* نتائج البحث */
        .student-item {
            background:#1f2937;
            padding:15px;
            margin-top:10px;
            border-radius:12px;
            cursor:pointer;
            transition:.2s;
            border-right: 4px solid #4facfe;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .student-item:hover {
            background:#374151;
            transform: scale(1.02);
        }

        /* ===== الأوائل (شبكة مثل index) ===== */
        .top-students-grid {
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:15px;
        }

        .rank-card {
            background:linear-gradient(135deg,#1f2937,#111827);
            padding:20px;
            border-radius:15px;
            text-align:center;
            transition:.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .rank-card:hover {
            transform:translateY(-5px);
            background:#1e293b;
        }

        .medal-icon {
            font-size:28px;
            margin-bottom:10px;
            display: block;
        }

        .student-name {
            font-weight:bold;
            font-size: 15px;
            display: block;
            margin-bottom: 5px;
        }

        .student-grade {
            font-size:12px;
            opacity:.6;
        }

        /* ألوان الميداليات */
        .gold { color:#ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.3); }
        .silver { color:#e5e7eb; }
        .bronze { color:#d97706; }

        .footer{
            text-align:center;
            padding:30px 15px;
            font-size:13px;
            color:#64748b;
        }

    </style>
</head>
<body>

<div class="app">

    <div class="hero">
        <img src="logo.jpeg" class="logo">
        <div class="school-name">ثانوية نور المعرفة الأهلية</div>
        <div class="developer-info">مطور الموقع: الأستاذ أحمد يحيى</div>
    </div>

    <div class="container">

        <div class="card">
            <h3>🔎 ابحث عن اسم الطالب</h3>
            <input type="text" id="searchInput" placeholder="اكتب اسم الطالب هنا...">
            <div id="results"></div>
        </div>

        <h3>🏆 أوائل المدرسة</h3>
        <div class="top-students-grid" id="topStudents">
            </div>

    </div>

    <div class="footer">
        © ثانوية نور المعرفة الأهلية - جميع الحقوق محفوظة
    </div>

</div>

<script>
    let students=[];

    // جلب البيانات من السكربت
    fetch("https://script.google.com/macros/s/AKfycbxopBokrO5hVaRqywgOZLD_FXmpLLdzHujFxpcfqWPu2eylieqYs2E-pl9gNYOPY7ym2A/exec")
    .then(res=>res.json())
    .then(data=>{
        students=data;
        
        // ترتيب حسب المجموع للأوائل
        let sorted=[...students].sort((a,b)=>b.total-a.total);
        let top10=sorted.slice(0,10);
        
        let html="";
        top10.forEach((s,i)=>{
            let medal = "#" + (i+1);
            let medalClass = "";
            
            if(i==0){ medal="🥇"; medalClass="gold"; }
            else if(i==1){ medal="🥈"; medalClass="silver"; }
            else if(i==2){ medal="🥉"; medalClass="bronze"; }

            html+=`
                <div class="rank-card">
                    <span class="medal-icon ${medalClass}">${medal}</span>
                    <span class="student-name">${s.name}</span>
                    <span class="student-grade">${s.grade}</span>
                </div>
            `;
        });
        document.getElementById("topStudents").innerHTML=html;
    });

    // منطق البحث
    document.getElementById("searchInput").addEventListener("input",function(){
        let value=this.value.toLowerCase().trim();
        let resultsDiv = document.getElementById("results");
        
        if(value === "") {
            resultsDiv.innerHTML = "";
            return;
        }

        let filtered=students.filter(s=>
            s.name.toLowerCase().includes(value)
        );

        let html="";
        filtered.slice(0, 5).forEach(s=>{
            html+=`
                <div class="student-item" onclick="openStudent('${encodeURIComponent(s.name)}')">
                    <span>${s.name}</span>
                    <span style="opacity: 0.5; font-size: 12px;">عرض النتيجة ←</span>
                </div>
            `;
        });
        resultsDiv.innerHTML=html;
    });

    function openStudent(name){
        window.location.href="student.html?name="+name;
    }
</script>

</body>
</html>
